name: Build RinthOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Make script executable
      run: chmod +x build.sh

    - name: Run RinthOS Build Script
      run: ./build.sh

    - name: Upload Finished RinthOS ISO
      uses: actions/upload-artifact@v4
      with:
        name: rinthos-linux-iso
        path: rinthos-amd64.iso
        retention-days: 5
