# Reads globalStorage["packagechooser_browser"] and installs the pick
# in the target chroot. If the pick is not Firefox, Firefox is removed.
# Requires an internet connection during install.

dontChroot: false
timeout: 600

packagechooser_browser:
  firefox:
    - command: "true"

  brave:
    - command: "pacman -Syu --noconfirm --needed brave-bin"
    - command: "pacman -Rns --noconfirm firefox"

  zen:
    - command: "pacman -Syu --noconfirm --needed zen-browser-bin"
    - command: "pacman -Rns --noconfirm firefox"

  chromium:
    - command: "pacman -Syu --noconfirm --needed chromium"
    - command: "pacman -Rns --noconfirm firefox"
