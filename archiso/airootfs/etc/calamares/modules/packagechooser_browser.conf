# Frog Linux — browser picker
# The user's choice is written to globalStorage["packagechooser_browser"]
# and actioned by the matching contextualprocess_browser module.

mode: required
method: legacy
id: browser

default: firefox

items:
  - id: firefox
    package: firefox
    name: Firefox
    description: >
      Mozilla's open-source browser. Keep the pre-installed default.
    screenshot: /usr/share/pixmaps/firefox.png

  - id: brave
    package: brave-bin
    name: Brave
    description: >
      Privacy-focused Chromium fork with built-in ad blocking.
    screenshot: /usr/share/pixmaps/brave.png

  - id: zen
    package: zen-browser-bin
    name: Zen Browser
    description: >
      Beautiful Firefox-based browser with modern UX.
    screenshot: /usr/share/pixmaps/zen.png

  - id: chromium
    package: chromium
    name: Chromium
    description: >
      Google's open-source browser.
    screenshot: /usr/share/pixmaps/chromium.png
