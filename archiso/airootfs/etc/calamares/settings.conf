# Frog Linux — Calamares configuration
# See https://github.com/calamares/calamares/wiki/Configuration

modules-search: [ local, /usr/lib/calamares/modules ]

# Custom instances of stock modules. Each entry lets us reuse a shipped
# module (packagechooser / contextualprocess) with a project-specific
# config file, referenced in the sequence as `<module>@<id>`.
instances:
- id: browser
  module: packagechooser
  config: packagechooser_browser.conf
- id: browser
  module: contextualprocess
  config: contextualprocess_browser.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - packagechooser@browser
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - networkcfg
  - hwclock
  - initcpiocfg
  - initcpio
  - grubcfg
  - bootloader
  - contextualprocess@browser
  - umount
- show:
  - finished

branding: frog

prompt-install: true
dont-chroot: false
