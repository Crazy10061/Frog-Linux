# SDDM autologin — logs `admin` straight into a Plasma session.
# Session is the default Wayland session (plasma.desktop from
# /usr/share/wayland-sessions/), which is guaranteed to ship with Plasma 6.
# Users can pick the X11 session from the SDDM chooser after logout.
[Autologin]
User=admin
Session=plasma.desktop
Relogin=false
