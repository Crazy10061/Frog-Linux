name: Build Frog Linux ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged # Required for archiso to mount loop devices

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize pacman keyring
      run: |
        set -euo pipefail
        pacman-key --init
        pacman-key --populate archlinux

    - name: Initialize Pacman & Configure Repos
      run: |
        set -euxo pipefail

        # Always sync Arch keyring first
        pacman -Syy --noconfirm archlinux-keyring ca-certificates curl

        # Add CachyOS repos explicitly (no interactive script)
        cat >> /etc/pacman.conf <<'EOF'

        [cachyos]
        SigLevel = Required DatabaseOptional
        Server = https://mirror.cachyos.org/repo/$repo/$arch

        [cachyos-v3]
        SigLevel = Required DatabaseOptional
        Server = https://mirror.cachyos.org/repo/$repo/$arch
        EOF

        # Install CachyOS keyring + mirrorlist first, then refresh DB
        pacman -Syy --noconfirm cachyos-keyring cachyos-mirrorlist || true
        pacman -Syy --noconfirm

        # Install required build tools
        pacman -S --noconfirm --needed archiso git tar

    - name: Set Up Archiso Profile with Dual Kernels
      run: |
        # 1. Create the workspace profile from the official layout
        cp -r /usr/share/archiso/configs/releng/ ./frog-profile
        
        # 2. Inject CachyOS repos into the profile's pacman.conf
        cat /etc/pacman.conf > ./frog-profile/pacman.conf

        # 3. Copy your custom repository package list into the profile workspace
        cp archiso/packages.x86_64 ./frog-profile/packages.x86_64
        
        # 4. Copy your local configurations (like wallpapers/themes) if they exist
        if [ -d "archiso/airootfs" ]; then
          cp -r archiso/airootfs/* ./frog-profile/airootfs/
        fi

    - name: Build Frog Linux ISO
      run: |
        mkdir ./output
        # Run mkarchiso to compile the final bootable ISO
        mkarchiso -v -w ./work -o ./output ./frog-profile

    - name: Upload Frog Linux ISO
      uses: actions/upload-artifact@v4
      with:
        name: Frog-Linux-ISO
        path: ./output/*.iso
